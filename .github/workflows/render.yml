name: 🎬 Render Product Videos Series

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    name: Render ${{ matrix.product }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        product: [digest, urinary, mobility, artro, vision, alergy, gymgo, bronqui, senior, cartilag, derma, lifequality, calm]
      fail-fast: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: 🎨 Install system dependencies for Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 fonts-liberation

      - name: 📁 Create output folder
        run: mkdir -p out

      - name: 🎬 Render video — ${{ matrix.product }}
        run: |
          npx remotion render product-${{ matrix.product }} out/${{ matrix.product }}.mp4 \
            --gl=swiftshader \
            --concurrency=2

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.product }}
          path: out/${{ matrix.product }}.mp4
          retention-days: 30
