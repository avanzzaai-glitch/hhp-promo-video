name: 🎬 Render Avanzza Promo Videos

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    name: Render ${{ matrix.video }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        video: [avanzza-promo, avanzza-promo2]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm install

      - name: 🎨 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 fonts-liberation

      - name: 📁 Create output folder
        run: mkdir -p out

      - name: 🎬 Render ${{ matrix.video }}
        run: |
          npx remotion render ${{ matrix.video }} out/${{ matrix.video }}.mp4 \
            --gl=swiftshader \
            --concurrency=2

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.video }}
          path: out/${{ matrix.video }}.mp4
          retention-days: 30
